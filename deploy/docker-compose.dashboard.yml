services:
  business-dashboard:
    build:
      context: ..
      dockerfile: deploy/dashboard.Dockerfile
    container_name: bigshot-business-dashboard
    restart: unless-stopped
    env_file:
      - dashboard.env
    environment:
      DASHBOARD_HOST: 0.0.0.0
      DASHBOARD_PORT: 5062
      DASHBOARD_SECRET_KEY: ${SESSION_SECRET:?Set SESSION_SECRET in deploy/dashboard.env}
      DASHBOARD_COOKIE_SECURE: ${DASHBOARD_COOKIE_SECURE:-1}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${DASHBOARD_PUBLISHED_HOST:-127.0.0.1}:${DASHBOARD_PUBLISHED_PORT:-5062}:5062"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5062/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
