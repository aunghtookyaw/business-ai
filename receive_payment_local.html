<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Receive Payment</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f6f7f9; color: #111; }
    header { padding: 18px 22px; background: white; border-bottom: 1px solid #ccc; }
    h1 { margin: 0; font-size: 24px; }
    main { display: grid; grid-template-columns: 1.4fr .8fr; gap: 16px; padding: 16px; }
    section { background: white; border: 1px solid #ccc; border-radius: 6px; overflow: hidden; }
    .toolbar { padding: 12px; border-bottom: 1px solid #ddd; display: flex; gap: 8px; }
    input, textarea, button { font: inherit; padding: 8px; border-radius: 4px; border: 1px solid #bbb; }
    input, textarea { width: 100%; box-sizing: border-box; }
    input[readonly] { background: #f1f3f5; }
    button { background: #176b5d; color: white; border: 0; cursor: pointer; font-weight: bold; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    th, td { padding: 8px; border-bottom: 1px solid #ddd; text-align: left; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    th { background: #f1f3f5; }
    tr { cursor: pointer; }
    tr.selected { background: #dff3ee; }
    .table-wrap { max-height: calc(100vh - 140px); overflow: auto; }
    .side { padding: 14px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .field { margin-bottom: 10px; }
    label { display: block; font-size: 12px; font-weight: bold; color: #555; margin-bottom: 4px; }
    .status { margin-top: 10px; color: #555; }
    .error { color: #b00020; }
    @media (max-width: 900px) { main { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header><h1>Receive Payment</h1></header>
  <main>
    <section>
      <div class="toolbar">
        <input id="search" type="search" placeholder="Search sector, invoice number, customer">
        <button id="refresh" type="button">Refresh</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Sector</th>
              <th>Invoice Number</th>
              <th>Customer</th>
              <th>Invoice Date</th>
              <th>Voucher Total</th>
              <th>Total Received</th>
              <th>Outstanding</th>
            </tr>
          </thead>
          <tbody id="voucherRows">
            <tr><td colspan="7">Loading vouchers...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
    <section class="side">
      <div class="grid">
        <div class="field"><label>Sector</label><input id="sector" readonly></div>
        <div class="field"><label>Invoice Number</label><input id="invoiceNumber" readonly></div>
        <div class="field"><label>Customer</label><input id="customer" readonly></div>
        <div class="field"><label>Invoice Date</label><input id="invoiceDate" readonly></div>
        <div class="field"><label>Voucher Total</label><input id="voucherTotal" readonly></div>
        <div class="field"><label>Total Received</label><input id="totalReceived" readonly></div>
      </div>
      <div class="field"><label>Outstanding Balance</label><input id="outstandingBalance" readonly></div>
      <form id="paymentForm">
        <div class="field"><label>Receive Amount</label><input id="receiveAmount" inputmode="numeric" required></div>
        <div class="field"><label>Payment Method</label><input id="paymentMethod" placeholder="Cash, KPay, Bank..."></div>
        <div class="field"><label>Reference Number</label><input id="referenceNumber"></div>
        <div class="field"><label>Notes</label><textarea id="notes" rows="4"></textarea></div>
        <button id="save" type="submit" disabled>Save Payment</button>
        <div id="status" class="status">Loading vouchers...</div>
      </form>
    </section>
  </main>
  <script>
    const API = 'http://127.0.0.1:5060';
    let vouchers = [];
    let selected = null;
    const rowsEl = document.getElementById('voucherRows');
    const saveEl = document.getElementById('save');
    const statusEl = document.getElementById('status');
    const money = value => Number(value || 0).toLocaleString();
    function status(message, error=false) {
      statusEl.textContent = message;
      statusEl.className = error ? 'status error' : 'status';
    }
    function render() {
      rowsEl.innerHTML = '';
      if (!vouchers.length) {
        rowsEl.innerHTML = '<tr><td colspan="7">No vouchers found.</td></tr>';
        return;
      }
      for (const v of vouchers) {
        const tr = document.createElement('tr');
        if (
          selected &&
          selected.sector === v.sector &&
          selected.invoice_number === v.invoice_number &&
          selected.invoice_date === v.invoice_date &&
          selected.customer === v.customer
        ) tr.className = 'selected';
        tr.innerHTML = `<td>${v.sector}</td><td>${v.invoice_number}</td><td>${v.customer || ''}</td><td>${v.invoice_date || ''}</td><td>${money(v.voucher_total)}</td><td>${money(v.total_received)}</td><td>${money(v.outstanding_balance)}</td>`;
        tr.onclick = () => selectVoucher(v);
        rowsEl.appendChild(tr);
      }
    }
    function selectVoucher(v) {
      selected = v;
      document.getElementById('sector').value = v.sector;
      document.getElementById('invoiceNumber').value = v.invoice_number;
      document.getElementById('customer').value = v.customer || '';
      document.getElementById('invoiceDate').value = v.invoice_date || '';
      document.getElementById('voucherTotal').value = money(v.voucher_total);
      document.getElementById('totalReceived').value = money(v.total_received);
      document.getElementById('outstandingBalance').value = money(v.outstanding_balance);
      saveEl.disabled = false;
      status('Ready.');
      render();
    }
    async function loadVouchers() {
      const q = document.getElementById('search').value.trim();
      const res = await fetch(API + '/api/vouchers' + (q ? '?q=' + encodeURIComponent(q) : ''));
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || 'Could not load vouchers');
      vouchers = data.vouchers;
      render();
      status('Loaded ' + vouchers.length + ' vouchers.');
    }
    async function refreshSelected() {
      if (!selected) return;
      const res = await fetch(
        API + `/api/voucher?sector=${encodeURIComponent(selected.sector)}` +
        `&invoice_number=${encodeURIComponent(selected.invoice_number)}` +
        `&invoice_date=${encodeURIComponent(selected.invoice_date || '')}` +
        `&customer=${encodeURIComponent(selected.customer || '')}`
      );
      const data = await res.json();
      if (data.ok) selectVoucher(data.voucher);
      await loadVouchers();
    }
    document.getElementById('refresh').onclick = () => loadVouchers().catch(err => status(err.message, true));
    document.getElementById('search').oninput = () => loadVouchers().catch(err => status(err.message, true));
    document.getElementById('paymentForm').onsubmit = async event => {
      event.preventDefault();
      if (!selected) return;
      saveEl.disabled = true;
      status('Saving...');
      try {
        const res = await fetch(API + '/api/payment-receive', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            sector: selected.sector,
            invoice_number: selected.invoice_number,
            invoice_date: selected.invoice_date,
            customer: selected.customer,
            receive_amount: document.getElementById('receiveAmount').value,
            payment_method: document.getElementById('paymentMethod').value,
            reference_number: document.getElementById('referenceNumber').value,
            notes: document.getElementById('notes').value
          })
        });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || 'Save failed');
        document.getElementById('receiveAmount').value = '';
        document.getElementById('paymentMethod').value = '';
        document.getElementById('referenceNumber').value = '';
        document.getElementById('notes').value = '';
        selectVoucher(data.voucher);
        await refreshSelected();
        status('Payment saved. Totals refreshed.');
      } catch (err) {
        status(err.message, true);
      } finally {
        saveEl.disabled = !selected;
      }
    };
    loadVouchers().catch(err => status(err.message, true));
  </script>
</body>
</html>
